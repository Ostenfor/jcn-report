name: Generate JCN Report

on:
  workflow_dispatch:

  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Debug workflow trigger
        run: |
          echo "Workflow triggered"
          echo "Event name: ${{ github.event_name }}"
          echo "UTC time:"
          date -u
          echo "Runner local time:"
          date

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore report history cache
        uses: actions/cache@v4
        with:
          path: .report-history
          key: jcn-report-history-${{ github.run_id }}
          restore-keys: |
            jcn-report-history-

      - name: Restore previous reports into reporte folder
        run: |
          mkdir -p reporte

          if [ -d ".report-history/reporte" ]; then
            echo "Restoring previous reports from cache..."
            cp -a .report-history/reporte/. reporte/
          else
            echo "No previous report history found."
          fi

          echo "Reports before new run:"
          ls -la reporte || true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run JCN report
        env:
          JCN_USER: ${{ secrets.JCN_USER }}
          JCN_PASS: ${{ secrets.JCN_PASS }}
          CI: "true"
          REPORT_OVERWRITE: "true"
        run: node testa.js

      - name: Prepare Pages folder with last 3 reports
        run: |
          mkdir -p reporte

          echo "Reports after new run:"
          ls -la reporte || true

          # Remove old index before selecting real report files
          rm -f reporte/index.html

          # Keep only the latest 3 real HTML reports
          find reporte -maxdepth 1 -type f -name "*.html" ! -name "index.html" -printf "%T@ %p\n" \
            | sort -rn \
            | awk 'NR>3 {print $2}' \
            | xargs -r rm -f

          latest_file=$(find reporte -maxdepth 1 -type f -name "*.html" ! -name "index.html" -printf "%T@ %p\n" \
            | sort -rn \
            | head -n 1 \
            | cut -d' ' -f2-)

          if [ -n "$latest_file" ]; then
            echo "Latest report is: $latest_file"
            cp "$latest_file" reporte/index.html
          else
            echo "<h1>No report generated</h1>" > reporte/index.html
          fi

          # Create history.json for the website dropdown/history selector
          echo "[" > reporte/history.json

          first=true
          find reporte -maxdepth 1 -type f -name "*.html" ! -name "index.html" -printf "%T@|%f\n" \
            | sort -rn \
            | while IFS="|" read -r timestamp filename; do
                if [ "$first" = true ]; then
                  first=false
                else
                  echo "," >> reporte/history.json
                fi

                safe_filename=$(printf '%s' "$filename" | sed 's/"/\\"/g')
                echo "  {\"file\":\"$safe_filename\",\"label\":\"$safe_filename\"}" >> reporte/history.json
              done

          echo "]" >> reporte/history.json

          echo "Final reports prepared for Pages:"
          ls -la reporte
          echo "Generated history.json:"
          cat reporte/history.json

      - name: Save report history for next run
        run: |
          rm -rf .report-history
          mkdir -p .report-history
          cp -a reporte .report-history/reporte

          echo "Cached report history:"
          ls -la .report-history/reporte

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: reporte

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4